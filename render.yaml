services:
  - type: web
    name: nexora-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexora-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.4
    
  - type: web
    name: nexora-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nexora-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: 20.11.0

databases:
  - name: nexora-db
    databaseName: nexora
    user: nexora
    plan: free
